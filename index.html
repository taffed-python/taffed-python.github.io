        document.getElementById("b-res-bar").className = bot.resType==="energy" ? "res-energy" : "res-mana";
        document.getElementById("b-res-bar").style.width = `${(bot.res/bot.maxRes)*100}%`;
        document.getElementById("b-avatar").src = AVATARS[matchGender][bot.fClass];
        renderStatuses(bot, "b-status");

        // --- ОБНОВЛЕНИЕ СПИСКА НАВЫКОВ И КНОПОК ---
        let html = `<label style="flex-direction: column; align-items: flex-start; text-align: left;">
            <div style="display: flex; align-items: center;">
                <input type="radio" name="spell" value="none" checked> 
                <span style="font-weight: bold;">Базовая атака</span>
            </div>
            <div style="font-size: 12px; color: #DEE2B1; opacity: 0.85; margin-top: 4px; font-weight: normal; line-height: 1.3;">
                Обычная атака без затрат ресурсов.
            </div>
        </label>`;

        if(player.hasPotion) {
            html += `<label style="flex-direction: column; align-items: flex-start; text-align: left;">
                <div style="display: flex; align-items: center;">
                    <input type="radio" name="spell" value="potion"> 
                    <span style="font-weight: bold;">💊 Допинг [1 шт]</span>
                </div>
                <div style="font-size: 12px; color: #DEE2B1; opacity: 0.85; margin-top: 4px; font-weight: normal; line-height: 1.3;">
                    Восстанавливает 10-15 здоровья и 2-3 ресурса. Не тратит ход.
                </div>
            </label>`;
        }

        C_DATA[player.fClass].skills.forEach(s => {
            let cd = player.cooldowns[s.id] || 0;
            let dis = (player.res < s.cost || cd > 0) ? "disabled" : "";
            
            // ДОБАВЛЯЕМ КЛАСС ДЛЯ КУЛДАУНА
            let cdClass = cd > 0 ? "on-cooldown" : ""; 
            
            let cdTxt = cd > 0 ? ` <span style="color:#e74c3c; margin-left: 6px;">⏳ [КД: ${cd}]</span>` : "";
            
            // Проверяем, был ли этот навык выбран до обновления
            let isChecked = document.querySelector(`input[name="spell"][value="${s.id}"]`)?.checked ? "checked" : "";

            // Вставляем cdClass в список классов label
            html += `<label class="${dis} ${cdClass}" style="flex-direction: column; align-items: flex-start; text-align: left;">
                <div style="display: flex; align-items: center; position: relative; z-index: 2;">
                    <input type="radio" name="spell" value="${s.id}" ${dis?'disabled':''} ${isChecked}> 
                    <span style="font-weight: bold;">${s.name} (${s.cost} ${player.resType==='energy'?'Эн.':'Ман.'})</span>${cdTxt}
                </div>
                <div style="font-size: 12px; color: #DEE2B1; opacity: 0.85; margin-top: 4px; font-weight: normal; line-height: 1.3; position: relative; z-index: 2;">
                    ${s.desc || ''}
                </div>
            </label>`;
        });

        document.getElementById("skills-container").innerHTML = html;

        // --- ПРИМЕНЕНИЕ VFX ЭФФЕКТОВ НА АВАТАРКИ ---
        function applyVFX(f, avatarId) {
            let avatar = document.getElementById(avatarId);
            avatar.className = "avatar"; 
            
            if (f.latestDebuff && (!f.effects[f.latestDebuff] || f.effects[f.latestDebuff].t <= 0)) {
                f.latestDebuff = null;
            }

            if (!f.latestDebuff) {
                const badStatuses = ["burn", "poison", "bleed", "curse", "ice", "dmgDebuff", "vuln", "exhaustion", "sunder", "sticky", "miasma"];
                for (let d of badStatuses) {
                    if (f.effects[d] && f.effects[d].t > 0) {
                        f.latestDebuff = d;
                        break;
                    }
                }
            }

            if (f.latestDebuff) {
                if (["dmgDebuff", "atkDebuff", "miasma"].includes(f.latestDebuff)) {
                    avatar.classList.add("avatar-debuff");
                } else {
                    avatar.classList.add("avatar-" + f.latestDebuff);
                }
            }
        }
        
        applyVFX(player, "p-avatar");
        applyVFX(bot, "b-avatar");
    }

    function applyMitigation(def, dmg, isDot, isMagic, att = null) {
        let logTxt = "", finalDmg = dmg;
        if (def.fClass === "samurai" && !isDot && finalDmg > 0 && Math.random() < 0.25) {
            finalDmg = Math.max(1, finalDmg - 4); 
            logTxt += ` 👺 Парирование (-4)!`;
        }
        if (def.fClass === "shieldbearer") {
            finalDmg = Math.max(isDot ? 1 : 1, finalDmg - 1);
            if (!isDot && finalDmg > 0 && Math.random() < 0.25) { 
                let blockAmt = getRnd(3, 4); 
                finalDmg = Math.max(1, finalDmg - blockAmt); logTxt += ` 🧱 Блок щитом (-${blockAmt})!`; 
            }
        }
        if (def.fClass === "beekeeper" && finalDmg > 0 && Math.random() < 0.25) {
            finalDmg = Math.max(isDot ? 0 : 1, finalDmg - 2);
            logTxt += ` 🍯 Воск (-2)!`;
            if (att && att !== def) {
                applyStatus(def, att, "sticky", 2, 0.15, false); logTxt += ` Враг в меду!`;
            }
        }
        if (def.fClass === "warlock" && def.effects.pacified.t > 0 && !isDot && finalDmg > 0) {
            finalDmg = Math.max(1, Math.round(finalDmg * 0.35)); // Оставляем 35% урона (срез 65%)
            logTxt += ` 🌑 Броня Неназываемого (-65%)!`;
        }
        return { finalDmg, logTxt };
    }
    function applyStatus(caster, target, type, t, a = 0, isDot = false) {
        let realTarget = target;
        let msg = "";
        // Проверяем Щит Маны
        if (caster !== target && target.effects.shield.t > 0) {
            realTarget = caster;
            msg = " 🛡️ Щит маны отразил эффект!";
        }
        
        if (isDot) {
            if (realTarget.effects[type].t > 0) {
                realTarget.effects[type].a += a;
                realTarget.effects[type].t = Math.max(realTarget.effects[type].t, t);
            } else {
                realTarget.effects[type] = { t: t, a: a };
            }
        } else {
            realTarget.effects[type] = { t: t, a: a };
        }

        // --- НОВАЯ ЛОГИКА: Запоминаем последний негативный статус ---
        const badStatuses = ["burn", "poison", "bleed", "curse", "ice", "dmgDebuff", "vuln", "exhaustion", "sunder", "sticky", "miasma"];
        if (badStatuses.includes(type)) {
            realTarget.latestDebuff = type;
        }

        return msg;
    }
    function applyVuln(target, dmg) {
        return target.effects.vuln.t > 0 ? Math.round(dmg * (1 + target.effects.vuln.a)) : dmg;
    }

    function dealSkillDamage(caster, target, baseDmg, isMagic, isDot = false) {
        let mit = applyMitigation(target, baseDmg, isDot, isMagic, caster);
        let finalDmg = applyVuln(target, mit.finalDmg);
        let reflectMsg = "";
        
        if (target.effects.shield.t > 0 && !isDot) {
            let reflect = Math.ceil(finalDmg / 2);
            finalDmg = Math.floor(finalDmg / 2);
            target.takeDamage(finalDmg);
            caster.takeDamage(reflect);
            reflectMsg = ` 🛡️ Щит маны отражает ${reflect} урона!`;
        } else {
            target.takeDamage(finalDmg);
        }
        return { dmg: finalDmg, msg: mit.logTxt + reflectMsg };
    }

    function calculateStrike(att, def, aZone, bZones, fixedDmg = null, ignoreBlock = false, isHalfDmg = false, isSwarm = false) {
        
        if(att.effects.pacified.t > 0) {
            return [`🌑 ${att.logName} укрыт Броней Неназываемого и не совершает атаку.`, "system"];
        }
        // --- 🍀 D20 МЕХАНИКА (СВЕЗЛО / ЗАПАДЛО) ---
        let d20Msg = "";
        let d20DmgBonus = 0;
        if (!att.d20Rolled && !isSwarm) {
            att.d20Rolled = true;
            let roll = Math.random();
            let isBasic = (fixedDmg === null);

            if (roll < 0.025) { // 🟢 2.5% СВЕЗЛО
                if (att.fClass === "rogue") {
                    att.effects.bonusRegen = {t: 2, a: 3};
                    d20Msg = `<span style='color:#2ecc71'>🍀 СВЕЗЛО! Выброс адреналина: регенерация энергии +3 на 2 хода!</span><br>`;
                } else if (att.fClass === "berserker") {
                    att.megaCrit = true;
                    d20Msg = `<span style='color:#2ecc71'>🍀 СВЕЗЛО! Мега-крит: урон будет умножен на 1.5!</span><br>`;
                } else if (att.fClass === "mage") {
                    if (isBasic) d20DmgBonus += 2;
                    applyStatus(att, def, "ice", 1);
                    d20Msg = `<span style='color:#2ecc71'>🍀 СВЕЗЛО! Посохом в глазень! +2 урона, враг приложил холодное на ушиб, 50% промаха (Лед)!</span><br>`;
                } else if (att.fClass === "paladin") {
                    let amt = getRnd(2, 3);
                    att.maxHp += amt; att.heal(amt);
                    d20Msg = `<span style='color:#2ecc71'>🍀 СВЕЗЛО! Слава Иису! Макс. HP и здоровье увеличены на ${amt}!</span><br>`;
                } else if (att.fClass === "crossbowman") {
                    att.headshot = true;
                    d20Msg = `<span style='color:#2ecc71'>🍀 СВЕЗЛО! Стрелой в лоб! Если не в блок — враг получит Уязвимость!</span><br>`;
                } else if (att.fClass === "plague_doctor") {
                    let hDebuff = getRnd(4, 5);
                    applyStatus(att, def, "healDebuff", 99, hDebuff); // Срез лечения на врага
                    att.effects.regen = {t: 2, a: 2}; // Вешаем на себя Регенерацию
                    d20Msg = `<span style='color:#2ecc71'>🍀 СВЕЗЛО! Коронавирус! Следующее лечение врага снижено на ${hDebuff}, а Доктор получает Регенерацию (+2 HP) на 2 хода!</span><br>`;
                
                } else if (att.fClass === "warlock") {
                    let curseBoost = getRnd(3, 4);
                    applyStatus(att, def, "curse", 2, curseBoost, true);
                    d20Msg = `<span style='color:#2ecc71'>🍀 СВЕЗЛО! Продал душу демонам! Урон Проклятия мгновенно усилен на +${curseBoost}!</span><br>`;
                } else if (att.fClass === "shieldbearer") {
                    if (isBasic) d20DmgBonus += 2;
                    applyStatus(att, def, "vuln", 2, 0.15);
                    d20Msg = `<span style='color:#2ecc71'>🍀 СВЕЗЛО! Сбил с ног! +2 урона и Уязвимость врагу на 2 хода!</span><br>`;
                } else if (att.fClass === "beekeeper") {
                    att.swarm = 3;
                    d20Msg = `<span style='color:#2ecc71'>🍀 СВЕЗЛО! Пчеломатка атакует! Рой мгновенно вырастает до максимума (3)!</span><br>`;
                } else if (att.fClass === "samurai") {
                    if (isBasic) d20DmgBonus += 2;
                    let resBurn = getRnd(2, 3); def.res = Math.max(0, def.res - resBurn);
                    d20Msg = `<span style='color:#2ecc71'>🍀 СВЕЗЛО! Духи предков помогают в бою: +2 урона и сожжено ${resBurn} энергии врага!</span><br>`;
                }
            } else if (roll < 0.05) { // 🔴 2.5% ЗАПАДЛО
                if (att.fClass === "rogue") {
                    isHalfDmg = true;
                    d20Msg = `<span style='color:#e74c3c'>🤬 ЗАПАДЛО! Из трясущихся рук выскользывает кинжал! Урон снижен на 50%!</span><br>`;
                } else if (att.fClass === "berserker") {
                    applyStatus(att, att, "bleed", 2, 2, true);
                    d20Msg = `<span style='color:#e74c3c'>🤬 ЗАПАДЛО! Перестарался! Берсерк вешает на себя Кровотечение (2 ур/2 хода)!</span><br>`;
                } else if (att.fClass === "mage") {
                    att.takeDamage(2); att.res = Math.max(0, att.res - 1);
                    d20Msg = `<span style='color:#e74c3c'>🤬 ЗАПАДЛО! Перегрев посоха! Маг получает 2 урона и теряет 1 ману!</span><br>`;
                } else if (att.fClass === "paladin") {
                    att.takeDamage(2); att.effects.weakBlock = {t: 1, a: 2};
                    d20Msg = `<span style='color:#e74c3c'>🤬 ЗАПАДЛО! Боги гневаются! Молния с неба наносит 2 урона, следующий блок пропустит 2 урона!</span><br>`;
                } else if (att.fClass === "crossbowman") {
                    if (isBasic) att.crossbowJam = true;
                    let eLoss = getRnd(2, 3); att.res = Math.max(0, att.res - eLoss);
                    d20Msg = `<span style='color:#e74c3c'>🤬 ЗАПАДЛО! Осечка! Потеряно ${eLoss} энергии, урон не больше 1!</span><br>`;
                } else if (att.fClass === "plague_doctor") {
                    att.skipBlock = true;
                    d20Msg = `<span style='color:#e74c3c'>🤬 ЗАПАДЛО! Госпитализация! Доктор 100% провалит свой блок в этом ходу!</span><br>`;
                } else if (att.fClass === "warlock") {
                    let hpLoss = getRnd(2, 3);
                    att.maxHp -= hpLoss; att.hp = Math.min(att.hp, att.maxHp);
                    d20Msg = `<span style='color:#e74c3c'>🤬 ЗАПАДЛО! Оплата долгов! Платит кровью и навсегда теряет ${hpLoss} Макс. HP!</span><br>`;
                } else if (att.fClass === "shieldbearer") {
                    applyStatus(att, att, "weakBlock", 2, 0.5); 
                    d20Msg = `<span style='color:#e74c3c'>🤬 ЗАПАДЛО! Уронил щит на ногу! 2 хода любой блок режет урон лишь на 50%!</span><br>`;
                } else if (att.fClass === "beekeeper") {
                    att.takeDamage(2); att.swarm = 0;
                    d20Msg = `<span style='color:#e74c3c'>🤬 ЗАПАДЛО! Пчелы взбунтовались! Укусили хозяина на 2 урона, Рой разлетелся!</span><br>`;
                } else if (att.fClass === "samurai") {
                    d20DmgBonus -= 2; applyStatus(att, att, "sunder", 1, 0.5);
                    d20Msg = `<span style='color:#e74c3c'>🤬 ЗАПАДЛО! Перепил саке? Получи леща от жены. Урон снижен на 2, шанс провала блока 50%!</span><br>`;
                }
            }
        }
        // ------------------------------------------
        let zoneText = `<u>${ZONES[aZone].toLowerCase()}</u>`;
        let verb = att.fClass==="rogue"?"вонзает кинжал в":att.fClass==="berserker"?"рубит в":att.fClass==="paladin"?"бьет молотом в":att.fClass==="crossbowman"?"стреляет в":att.fClass==="plague_doctor"?"режет скальпелем в":att.fClass==="shieldbearer"?"бьет щитом в":att.fClass==="samurai"?"рубит катаной в":"бьет посохом в";
        if (isSwarm) verb = "напускает рой на";

        if(att.effects.sticky.t > 0 && Math.random() < att.effects.sticky.a) return [d20Msg + `🍯 Липкие руки мешают! ${att.logName} промахивается!`, "dodge"];
        if(att.effects.blind.t > 0) { att.effects.blind.t = 0; return [d20Msg + `😵 Ослепленный ${att.logName} бьет наугад и промахивается!`, "dodge"]; }
        if(att.effects.ice.t > 0 && Math.random() < 0.5) return [d20Msg + `🧊 ${att.logName} поскальзывается на льду! Промах!`, "dodge"];

        let isBlocked = bZones.includes(aZone.toString());
        let pierceMsg = "";
        
        if (def.skipBlock) { isBlocked = false; pierceMsg = " 🏥 Госпитализация! Блок провален!"; def.skipBlock = false; }
        if (isBlocked && def.effects.sunder.t > 0 && Math.random() < def.effects.sunder.a) { isBlocked = false; pierceMsg = " 💔 Раскол пробивает блок!"; }
        if (att.effects.unblockable && att.effects.unblockable.t > 0) { isBlocked = false; pierceMsg = " 👺 Удар из тени игнорирует блок!"; att.effects.unblockable.t = 0; }
        if (isBlocked && att.fClass === "plague_doctor" && att.effects.miasma.t > 0 && Math.random() < 0.5) { isBlocked = false; pierceMsg = " 🧪 Токсичные испарения обходят блок!"; }

        if(isBlocked && !ignoreBlock) {
            // D20: Штрафы на блок Паладина и Щитоносца
            if (def.effects.weakBlock && def.effects.weakBlock.t > 0) {
                if (def.effects.weakBlock.a === 2) {
                    let pDmg = Math.min(fixedDmg !== null ? fixedDmg : att.maxDmg, 2);
                    def.takeDamage(pDmg); def.effects.weakBlock.t = 0;
                    return [d20Msg + `🛡️ ${def.logName} блокирует, но Божий гнев пропустил ${pDmg} урона!`, "hit"];
                } else if (def.effects.weakBlock.a === 0.5) {
                    isHalfDmg = true; pierceMsg = " 🛡️ Травма: блок поглотил лишь половину урона!"; isBlocked = false; 
                }
            }
            if (isBlocked) {
                if (att.fClass === "crossbowman" && fixedDmg === null) {
                    fixedDmg = 2; pierceMsg = " 💥 Тяжелый болт пробивает даже блок!";
                } else if (att.fClass === "samurai" && att.effects.sharpen.c > 0) {
                    isHalfDmg = true; pierceMsg = " 🔪 Заточенный клинок прорезает блок наполовину!";
                } else {
                    let blockMsg = `🛡️ ${def.logName} блокирует удар в ${zoneText}.`;
                    if (def.fClass === "paladin") {
                        let healAmt = getRnd(1, 2); def.heal(healAmt); blockMsg += ` ♱ Свет лечит на ${healAmt} HP!`;
                        if(def.effects.thorns.t > 0) { let r = dealSkillDamage(def, att, 3, true); blockMsg += ` ⚡ Шипы бьют (${r.dmg} ур)!${r.msg}`; }
                    }
                    return [d20Msg + blockMsg, "block"];
                }
            }
        } else if (isBlocked && ignoreBlock) { pierceMsg = " 💥 Блок обойден!"; }

        if(def.fClass === "rogue" && def.effects.blind.t===0 && Math.random() < def.dodgeChance) { def.addRes(1); return [d20Msg + `💨 ${def.logName} перекатом уходит от атаки! (+1 Эн.)`, "dodge"]; }

        let gainMsg = "";
        if (!isSwarm) { 
            att.dealtPhysDmgThisTurn = true; 
            att.addRes(1); 
            let resIcon = att.resType === "energy" ? "⚡" : "💧";
            let resText = att.resType === "energy" ? "эн." : "ман.";
            gainMsg = ` ${resIcon} (+1 ${resText})`; 
        }

        let dmg = fixedDmg !== null ? fixedDmg : getRnd(att.minDmg, att.maxDmg);
        dmg += d20DmgBonus; // Бонус от СВЕЗЛО
        if (att.crossbowJam) dmg = Math.min(1, Math.max(0, dmg)); // Штраф Арбалетчика

        if (att.fClass === "mage" && def.hasAnyDebuff()) { dmg += 3; verb = "бьет светящимся посохом в"; }
        if (att.fClass === "samurai" && fixedDmg === null) {
            dmg += att.samuraiBonus;
            if (att.effects.sharpen.c > 0) { dmg += 5; att.effects.sharpen.c--; gainMsg += " 🔪 Смертельная сталь (+5)!"; }
        }
        if (att.fClass === "berserker" && fixedDmg === null) {
            let fury = Math.floor((att.maxHp - att.hp) / 12);
            if(fury > 0) { dmg += fury; gainMsg += ` 😡 Ярость (+${fury})!`; }
        }

        if(att.effects.dmgDebuff.t > 0) dmg = Math.max(1, dmg - att.effects.dmgDebuff.a);
        if(att.effects.atkDebuff.t > 0) dmg = Math.max(1, dmg - att.effects.atkDebuff.a);

        let isCrit = att.fClass === "berserker" && Math.random() < att.critChance;
        if (att.megaCrit) { dmg = Math.floor(dmg * 1.5); att.megaCrit = false; } // Мега-крит Берсерка
        else if (isCrit) dmg *= 2;

        if (isCrit) {
    showFloatingText(def.isBot ? "b-avatar" : "p-avatar", "КРИТ!", "crit");
}
        if(isHalfDmg) dmg = Math.max(1, Math.floor(dmg / 2));
        
        let mit = applyMitigation(def, dmg, false, false, att);
        let finalDmg = applyVuln(def, mit.finalDmg);

        // Хэдшот Арбалетчика
        if (!isBlocked && att.headshot && fixedDmg === null) {
            applyStatus(att, def, "vuln", 2, 0.15); att.headshot = false; gainMsg += " 🎯 Хэдшот! Враг уязвим!";
        }        
        // --- ВСТАВИТЬ РОСТ РОЯ СЮДА ---
        if (att.fClass === "beekeeper" && fixedDmg === null && finalDmg > 0) {
            att.swarm = Math.min(3, att.swarm + 1);
            gainMsg += ` 🐝 Рой растет (${att.swarm})!`;
        }
        // ------------------------------
        
        let reflectMsg = "";
        if (def.effects.shield.t > 0) {
            let reflect = Math.ceil(finalDmg / 2);
            finalDmg = Math.floor(finalDmg / 2);
            def.takeDamage(finalDmg);
            att.takeDamage(reflect);
            reflectMsg = ` 🛡️ Щит маны отражает ${reflect} урона!`;
        } else {
            def.takeDamage(finalDmg);
        }
        
        let msg = d20Msg + (isCrit ? `💥 КРИТ! ${att.logName} пробивает ${zoneText}. Урон: ${finalDmg}!${pierceMsg}${mit.logTxt}${reflectMsg}${gainMsg}` 
                         : `⚔️ ${att.logName} ${verb} ${zoneText}. Урон: ${finalDmg}.${pierceMsg}${mit.logTxt}${reflectMsg}${gainMsg}`);

        if(att.fClass === "paladin" && Math.random() < 0.25) {
            let r = dealSkillDamage(att, def, 3, true);
            msg += ` ☀️ Вспышка Света (${r.dmg} ур)!${r.msg}`;
        }
        if (att.fClass === "plague_doctor" && fixedDmg === null) {
            let healAmt = def.effects.poison.t > 0 ? getRnd(2, 3) : 1;
            att.heal(healAmt);
            let sMsg = applyStatus(att, def, "poison", 2, 1, true); 
            msg += ` 🩸 Вампиризм (+${healAmt} HP)! ⚗️ Яд усилен.${sMsg}`;
        }
        if (att.fClass === "crossbowman" && Math.random() < 0.25) {
            msg += applyStatus(att, def, "dmgDebuff", 2, 2); msg += ` 🦵 Прострел ноги (-2 урон врага)!`;
        }
        if (att.fClass === "warlock" && fixedDmg === null) {
            let sMsg = applyStatus(att, def, "curse", 2, 1, true); 
            msg += ` 💀 Проклятие усилено!${sMsg}`;
        }

        // Контрудар Берсерка (Лечение и кровь)
        if (def.fClass === "berserker" && def.isAlive() && finalDmg > 0 && fixedDmg === null && Math.random() < 0.25) {
            let h = getRnd(3, 4);
            def.heal(h);
            let sMsg = applyStatus(def, att, "bleed", 2, 1, true); 
            msg += ` 🪓 Кровавый контрудар! ${def.name} лечится на ${h} ХП и пускает врагу кровь!${sMsg}`;
        }
        
        // Ядовитая кровь Доктора
        if (def.fClass === "plague_doctor" && def.isAlive() && finalDmg > 0 && fixedDmg === null && Math.random() < 0.25) {
            let sMsg = applyStatus(def, att, "poison", 2, 1, true);
            msg += ` 🧪 Ядовитая кровь! Атакующий отравлен.${sMsg}`;
        }
        return [msg, isCrit?"crit":"hit"];
    }
    function processSkill(caster, target, skillId, aZone, bZones) {
        let isCrit = caster.fClass === "mage" && Math.random() < caster.magicCritChance;
        let mult = isCrit ? 2 : 1;
        let cName = caster.logName;

        // Если маг кританул навыком, показываем всплывающий текст над целью
        if (isCrit) {
            showFloatingText(target.isBot ? "b-avatar" : "p-avatar", "КРИТ!", "crit");
        }

        if (skillId === "potion") {
            caster.hasPotion = false; 
            let healAmt = getRnd(10, 15);
            let resAmt = getRnd(2, 3);
            caster.heal(healAmt);
            caster.addRes(resAmt);
            let rName = caster.resType === "energy" ? "Эн." : "Ман.";
            logMsg(`💊 ${cName} принимает Допинг! Восстановлено ${healAmt} HP и ${resAmt} ${rName}.`, "heal"); 
            return;
        }

        caster.res -= C_DATA[caster.fClass].skills.find(s=>s.id===skillId).cost;
        caster.cooldowns[skillId] = 3; 
        
        if(skillId === "blind_powder") {
            let r = dealSkillDamage(caster, target, 3, true);
            let bMsg = " Враг увернулся от ослепления.";
            if (Math.random() < 0.65) {
                let sMsg = applyStatus(caster, target, "blind", 1);
                let realTarget = target.effects.shield.t > 0 ? caster : target;
                realTarget.effects.regen.t = 0; realTarget.effects.thorns.t = 0; realTarget.effects.sharpen.c = 0; realTarget.samuraiBonus = 0;
                bMsg = ` Враг ослеплен и теряет баффы!${sMsg}`;
            }
            logMsg(`😵 ${cName} бросает Ослепляющий порошок (${r.dmg} ур)!${bMsg}${r.msg}`, "spell"); return;
        }
        if(skillId === "sweep") {
            let r = dealSkillDamage(caster, target, 3, false);
            let sMsg = applyStatus(caster, target, "vuln", 2, 0.15);
            logMsg(`🗡️ ${cName} делает Подсечку (${r.dmg} ур)! Враг теряет равновесие (+15% получаемого урона на 2 хода).${sMsg}${r.msg}`, "spell"); return;
        }
        if(skillId === "mana_shield") {
            caster.effects.shield = {t:1}; logMsg(`🛡️ ${cName} возводит Щит Маны! Отражает 50% урона и ВСЕ дебаффы обратно во врага.`, "spell"); return;
        }
        if(skillId === "oath") {
            caster.effects.thorns = {t:2}; logMsg(`♱ ${cName} приносит Святую Клятву! Блоки усилены и отражают урон.`, "spell"); return;
        }
        
        if(skillId === "sharpen") {
            caster.effects.sharpen = {c:1}; 
            logMsg(`🗡️ ${cName} затачивает меч! +5 урона и пробивание блока на следующий удар.`, "spell"); return;
        }
        if(skillId === "shadow_stance") {
            caster.effects.unblockable = {t:1};
            caster.addRes(3);
            logMsg(`👺 ${cName} принимает Стойку тени! Восстановлено 3 Эн. Следующий удар нельзя заблокировать.`, "spell"); return;
        }

        if(skillId === "torn_wound") {
            let dmg = getRnd(caster.minDmg, caster.maxDmg);
            if(caster.effects.dmgDebuff.t > 0) dmg = Math.max(1, dmg - caster.effects.dmgDebuff.a);
            let r = dealSkillDamage(caster, target, dmg, false);
            let sMsg = applyStatus(caster, target, "bleed", 3, 2, true);
            logMsg(`🪓 ${cName} наносит Рваную Рану (${r.dmg} ур)! Враг истекает кровью.${sMsg}${r.msg}`, "crit");
        }
        else if (skillId === "execution") {
            caster.takeDamage(3); 
            let missingHp = caster.maxHp - caster.hp; 
            let bonusDmg = Math.floor(missingHp / 5); 
            let totalDmg = 3 + bonusDmg; 
            let r = dealSkillDamage(caster, target, totalDmg, false);
            logMsg(`🪓 ${cName} проводит жестокую Казнь! Теряет 3 HP, но наносит ${r.dmg} урона (Бонус от ран: +${bonusDmg}).${r.msg}`, "crit");
        }
        else if(skillId === "propolis") {
            let r = dealSkillDamage(caster, target, getRnd(2, 3), false);
            let sMsg = applyStatus(caster, target, "sticky", 2, 0.15);
            logMsg(`🐝 ${cName} бросает прополис (${r.dmg} ур)! У врага все руки в меду.${sMsg}${r.msg}`, "spell");
        }
        else if(skillId === "honey") {
            caster.heal(6);
            caster.swarm = 1; // Сбрасываем рой до 1
            logMsg(`🍯 ${cName} съедает медок! Отхил 6 ХП. Рой успокаивается до 1.`, "heal");
        }
        
        else if(skillId === "punish") {
            let r1 = dealSkillDamage(caster, target, getRnd(6, 8), false);
            let r2 = dealSkillDamage(caster, target, 3, true);
            let sMsg = applyStatus(caster, target, "atkDebuff", 1, 3);
            logMsg(`🔨 ${cName} обрушивает Карающий удар (${r1.dmg + r2.dmg} суммарно)! Атака врага снижена.${sMsg}${r1.msg}${r2.msg}`, "spell");
        }
        else if(skillId === "lucky_strike") {
            let isBlocked = bZones.includes(aZone.toString());
            if (isBlocked) {
                let r = dealSkillDamage(caster, target, 2, false);
                logMsg(`🏹 Тяжелый арбалетный болт пробивает даже блок! (${r.dmg} ур)${r.msg}`, "hit");
            } else {
                let r = dealSkillDamage(caster, target, getRnd(2, 14), false);
                logMsg(`🏹 ${cName} стреляет Шальным болтом! Урон: ${r.dmg}${r.msg}`, "crit");
            }
        }
        
        else if(skillId === "catalyst") {
            let r = dealSkillDamage(caster, target, getRnd(2, 3), true);
            let pMsg = "";
            if (target.effects.poison.t > 0 && target.effects.poison.a > 0) {
                target.effects.poison.a *= 2;
                target.effects.poison.t = 1; // Сброс до 1 хода
                pMsg = ` 🟢 Яд мутирует! Урон яда удвоен (до ${target.effects.poison.a}), но спадет через 1 ход.`;
            } else {
                pMsg = ` (На враге нет яда для мутации).`;
            }
            logMsg(`🧪 ${cName} бросает Катализатор (${r.dmg} ур)!${pMsg}${r.msg}`, "spell");
        }
        else if(skillId === "miasma") {
            caster.effects.miasma = {t:2};
            let sMsg = applyStatus(caster, target, "dmgDebuff", 2, 2);
            logMsg(`😵 ${cName} распыляет Миазмы! Урон врага снижен на 2. Атаки доктора обретают пробивную силу.${sMsg}`, "spell");
        }
        else if(skillId === "burning_ice") {
            let r = dealSkillDamage(caster, target, getRnd(3, 5) * mult, true);
            let effectMsg = "";
            if (Math.random() < 0.5) {
                let sMsg = applyStatus(caster, target, "burn", 2, 1, true); 
                if(sMsg === "") target.effects.ice.t = 0; 
                effectMsg = ` Наложено Горение.${sMsg}`;
            } else {
                let sMsg = applyStatus(caster, target, "ice", 2); 
                if(sMsg === "") target.effects.burn.t = 0;
                effectMsg = ` Враг обморожен.${sMsg}`;
            }
            logMsg(`❄️🔥 ${cName} кастует Горящий Лёд (${r.dmg} ур)!${effectMsg}${r.msg}`, isCrit?"crit":"spell");
        }
        else if(skillId === "incendiary") {
            let isBlocked = bZones.includes(aZone.toString());
            let rMsg = "";
            if (!isBlocked) {
                let r = dealSkillDamage(caster, target, getRnd(3, 5), false);
                rMsg = `(${r.dmg} ур) `;
            }
            let sMsg = applyStatus(caster, target, "burn", 2, 1, true);
            logMsg(`🧨 ${cName} выпускает Зажигательный болт ${rMsg}! Взрыв поджигает врага.${sMsg}`, "spell");
        }
        else if(skillId === "hex") {
            let r = dealSkillDamage(caster, target, getRnd(3, 4), true);
            let sMsg = applyStatus(caster, target, "curse", 2, 2, true);
            logMsg(`👁️ ${cName} насылает Сглаз (${r.dmg} ур)! Проклятие усилено на +2.${sMsg}${r.msg}`, "spell");
        }
        else if(skillId === "dark_armor") {
            caster.effects.pacified = {t:1};
            logMsg(`🌑 ${cName} облачается в Броню Неназываемого! Атака пропущена, но получаемый урон снижен на 65%.`, "spell");
        }
        else if(skillId === "shield_bash") {
            let r = dealSkillDamage(caster, target, getRnd(4, 6), false);
            let sMsg = applyStatus(caster, target, "exhaustion", 2, 1.0); // 1.0 = 100%
            logMsg(`🧱 ${cName} бьет щитом (${r.dmg} ур)! Враг истощен.${sMsg}${r.msg}`, "spell");
        }
        else if(skillId === "pin") {
            let r = dealSkillDamage(caster, target, getRnd(3, 5), false);
            let sMsg = applyStatus(caster, target, "sunder", 2, 0.5); // 0.5 = 50%
            logMsg(`📌 ${cName} применяет Пригвоздить (${r.dmg} ур)! Защита врага расколота.${sMsg}${r.msg}`, "spell");
        }
    }

    function toggleLog() {
        let log = document.getElementById("log-area");
        let caret = document.getElementById("log-caret");
        log.classList.toggle("expanded"); // Переключаем класс
        
        // Меняем стрелочку в зависимости от состояния
        if (log.classList.contains("expanded")) {
            caret.innerText = "🔼";
        } else {
            caret.innerText = "🔽";
        }
        // Оставляем скролл в самом низу
        log.scrollTop = log.scrollHeight;
    }

    function startGame() {
        try {
            selectedClass = getRadioVal("f_class", "rogue");
            document.getElementById("start-screen").classList.remove("active");
            document.getElementById("combat-screen").classList.add("active");
            startNewBattle();
        } catch (e) { alert("Ошибка!"); console.error(e); }
    }
    function goToStartScreen() { 
        document.getElementById("combat-screen").classList.remove("active"); 
        document.getElementById("start-screen").classList.add("active"); 
        document.getElementById("result-overlay").classList.remove("show");

        document.getElementById("btn-fight").innerHTML = "Сделать ход";
        document.getElementById("btn-fight").onclick = playRound;
    }

    function startNewBattle() {
        document.getElementById("result-overlay").classList.remove("show");

        let btnFight = document.getElementById("btn-fight");
        btnFight.innerHTML = "Сделать ход";
        btnFight.onclick = playRound;
        
        matchGender = Math.random() < 0.5 ? "male" : "female";
        playerAttackHistory = [];
        playerBlockHistory = [];
        player = new Fighter("Игрок", selectedClass, matchGender, false);
        let classes = ["rogue", "berserker", "mage", "paladin", "crossbowman", "plague_doctor", "warlock", "shieldbearer", "beekeeper", "samurai"];
        bot = new Fighter("Вражина", pickRandom(classes), matchGender, true);
        roundNum = 1;
        document.getElementById("btn-fight").style.display = "block"; 
        
        document.getElementById("log-area").innerHTML = ""; 
        logMsg(`⚔️ Бой начался! Ваш противник: ${NAMES[matchGender][bot.fClass]}.`, "system");
        
        // --- ДРАМАТИЧНЫЙ ВЪЕЗД ---
        let pPan = document.querySelector('.player-stats');
        let bPan = document.querySelector('.bot-stats');
        let vsPan = document.getElementById('vs-dramatic');
        let rightPan = document.querySelector('.combat-right'); // Захватываем правый блок управления
        
        // 1. Снимаем классы (если это не первый бой)
        pPan.classList.remove('anim-slide-left');
        bPan.classList.remove('anim-slide-right');
        vsPan.classList.remove('anim-vs');
        rightPan.classList.remove('anim-slide-up');
        
        // 2. Фокус с перерисовкой DOM, чтобы анимация запустилась заново
        void pPan.offsetWidth; 
        void rightPan.offsetWidth;
        
        // 3. Вешаем классы обратно
        pPan.classList.add('anim-slide-left');
        bPan.classList.add('anim-slide-right');
        vsPan.classList.add('anim-vs');
        rightPan.classList.add('anim-slide-up'); // Вызываем выезд панели
        // -------------------------
        updateStats();
    }

    function playRound() {
        let pAtt = getRadioVal("attack", "1"); 
        let pBlocks = getRadioVal("block", "1,2").split(","); 
        let pSpell = getRadioVal("spell", "none");
        
        // 1. ЗАПОМИНАЕМ ДЕЙСТВИЯ ИГРОКА (храним последние 5 ходов)
        playerAttackHistory.push(pAtt);
        if (playerAttackHistory.length > 5) playerAttackHistory.shift();
        
        // Запоминаем блоки (игнорируем ходы, когда игрок медитировал)
        if (pBlocks[0] !== "meditation") {
            playerBlockHistory.push(pBlocks);
            if (playerBlockHistory.length > 5) playerBlockHistory.shift();
        }

        // 2. УМНАЯ АТАКА БОТА (Поиск уязвимостей)
        let bAtt;
        // Если накопилась история и сработал шанс 70% - бот анализирует ваши блоки
        if (playerBlockHistory.length >= 3 && Math.random() < 0.70) {
            let blockCounts = {1:0, 2:0, 3:0, 4:0};
            // Считаем, сколько раз Игрок закрывал каждую зону
            playerBlockHistory.forEach(blocks => {
                blocks.forEach(zone => blockCounts[zone]++);
            });
            
            // Находим минимальное количество блоков
            let minBlocks = 999;
            for (let i = 1; i <= 4; i++) {
                if (blockCounts[i] < minBlocks) minBlocks = blockCounts[i];
            }
            
            // Собираем все зоны, которые Игрок защищает РЕЖЕ ВСЕГО
            let vulnerableZones = [];
            for (let i = 1; i <= 4; i++) {
                if (blockCounts[i] === minBlocks) vulnerableZones.push(i);
            }
            
            // Бьем в одну из самых открытых зон
            bAtt = pickRandom(vulnerableZones);
        } else {
            // Либо бьем случайно (чтобы бот не был 100% предсказуемым)
            bAtt = Math.floor(Math.random() * 4) + 1;
        }
        
        // 3. УМНЫЙ БЛОК БОТА
        let bBlocks;
        
        // --- ИИ-ФИЛЬТРЫ МЕДИТАЦИИ ---
        // 1. Когда открывать лицо КАТЕГОРИЧЕСКИ НЕЛЬЗЯ:
        let isPaladinThorns = bot.effects.thorns && bot.effects.thorns.t > 0; // Нужен блок для шипов Паладина
        let isVulnerable = bot.effects.vuln && bot.effects.vuln.t > 0; // Бот под уязвимостью
        let isLowHp = bot.hp <= 12; // Смертельно мало ХП
        let isEnemySharpened = player.effects.sharpen && player.effects.sharpen.c > 0; // Игрок заточил катану
        
        let shouldNotMeditate = isPaladinThorns || isVulnerable || isLowHp || isEnemySharpened;

        // 2. Когда медитировать ИДЕАЛЬНО (защитные баффы на нас):
        let isSuperSafe = (bot.effects.pacified && bot.effects.pacified.t > 0) || 
                          (bot.effects.shield && bot.effects.shield.t > 0);

        if (!shouldNotMeditate && ((bot.maxRes - bot.res >= 4 && Math.random() < 0.25) || (isSuperSafe && bot.res < bot.maxRes))) {
            bBlocks = ["meditation"]; 
        } else {
            let smartBlock = null;
            // Умный блок: анализируем историю атак игрока
            if (playerAttackHistory.length >= 3 && Math.random() < 0.75) { 
                let counts = {1:0, 2:0, 3:0, 4:0};
                playerAttackHistory.forEach(z => counts[z]++);
                let favoriteZone = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                
                let possibleBlocks = ["1,2", "2,3", "3,4", "1,4"].filter(b => b.includes(favoriteZone.toString()));
                if (possibleBlocks.length > 0) {
                    smartBlock = possibleBlocks[Math.floor(Math.random() * possibleBlocks.length)].split(",");
                }
            }
            // Если бот не смог прочитать ваши атаки, ставит случайный блок
            bBlocks = smartBlock || ["1,2", "2,3", "3,4", "1,4"][Math.floor(Math.random()*4)].split(",");
        }
        
        // 4. УМНОЕ ИСПОЛЬЗОВАНИЕ НАВЫКОВ БОТА
        let bSpell = "none";
        let botSpells = [];
        
        // Пьет зелье ТОЛЬКО если ХП упало ниже 40%
        if(bot.hasPotion && bot.hp < bot.maxHp * 0.4) botSpells.push("potion");
        
        C_DATA[bot.fClass].skills.forEach(s => { 
            if(bot.res >= s.cost && !bot.cooldowns[s.id]) {
                let isSmart = true;
                
                // --- ИИ-ФИЛЬТРЫ: Отсекаем глупые решения ---
                if (s.id === "catalyst" && (!player.effects.poison || player.effects.poison.t === 0)) isSmart = false; // Нет яда - нет Катализатора
                if (s.id === "execution" && (bot.maxHp - bot.hp) < 10) isSmart = false; // Казнь только если потеряно хотя бы 10 ХП
                if (s.id === "honey" && (bot.maxHp - bot.hp) < 4) isSmart = false; // Не жрет мед при полном ХП
                if (s.id === "sharpen" && bot.effects.sharpen && bot.effects.sharpen.c > 0) isSmart = false; // Не точит уже острый меч
                if (s.id === "shadow_stance" && bot.effects.unblockable && bot.effects.unblockable.t > 0) isSmart = false; 
                
                if (isSmart) botSpells.push(s.id); 
            }
        });
        
        // Если бот нашел "умные" скиллы, шанс их применить повышен до 75%
        if(botSpells.length > 0 && Math.random() < 0.75) bSpell = pickRandom(botSpells);

        logMsg(`<br>[--- РАУНД ${roundNum} ---]`, "system");
        player.dealtPhysDmgThisTurn = bot.dealtPhysDmgThisTurn = false;
        player.d20Rolled = bot.d20Rolled = false;
        player.skipBlock = bot.skipBlock = false;
        
        // Сбрасываем счетчики перед началом нового раунда
        player.turnMaxDmg = 0; player.turnMaxHeal = 0;
        bot.turnMaxDmg = 0; bot.turnMaxHeal = 0;

        if(!player.isAlive() || !bot.isAlive()) return checkGameOver();

        if (pBlocks[0] === "meditation") { player.addRes(4); logMsg(`🧘 ${player.name} медитирует (+4). Защита открыта!`, "system"); pBlocks = []; }
        if (bBlocks[0] === "meditation") { bot.addRes(4); logMsg(`🧘 ${bot.name} медитирует (+4). Защита открыта!`, "system"); bBlocks = []; }

        if(pSpell !== "none") processSkill(player, bot, pSpell, pAtt, bBlocks);
        if(bot.isAlive() && bSpell !== "none") processSkill(bot, player, bSpell, bAtt, pBlocks);

        let pStrikes = [{zone: pAtt, ignoreBlock: false, half: false, fixed: null, isSwarm: false}]; 
        let bStrikes = [{zone: bAtt, ignoreBlock: false, half: false, fixed: null, isSwarm: false}];
        
        // Разбойник (30%)
        if (player.fClass === "rogue" && Math.random() < 0.30) { 
            pStrikes.push({zone: pickRandom([1,2,3,4].filter(z=>z!=pAtt)), ignoreBlock: true, half: true, fixed: null, isSwarm: false}); 
            logMsg(`🗡️ ${player.name}: Подлый двойной удар сквозь блок!`, "system"); 
        }
        if (bot.fClass === "rogue" && Math.random() < 0.30) { 
            bStrikes.push({zone: pickRandom([1,2,3,4].filter(z=>z!=bAtt)), ignoreBlock: true, half: true, fixed: null, isSwarm: false}); 
            logMsg(`🗡️ ${bot.name}: Подлый двойной удар сквозь блок!`, "system"); 
        }
        
        // Рой Пчеловода бьет в рандомную зону (может попасть в блок)
        if (player.fClass === "beekeeper" && player.swarm > 0) {
            pStrikes.push({zone: Math.floor(Math.random()*4)+1, ignoreBlock: false, half: false, fixed: player.swarm, isSwarm: true});
        }
        if (bot.fClass === "beekeeper" && bot.swarm > 0) {
            bStrikes.push({zone: Math.floor(Math.random()*4)+1, ignoreBlock: false, half: false, fixed: bot.swarm, isSwarm: true});
        }
        
        pStrikes.forEach(s => { if(player.isAlive()&&bot.isAlive()) { let [m,t] = calculateStrike(player, bot, s.zone, bBlocks, s.fixed, s.ignoreBlock, s.half, s.isSwarm); logMsg(m,t); }});
        bStrikes.forEach(s => { if(bot.isAlive()&&player.isAlive()) { let [m,t] = calculateStrike(bot, player, s.zone, pBlocks, s.fixed, s.ignoreBlock, s.half, s.isSwarm); logMsg(m,t); }});
        
        [player, bot].forEach(f => {
            if(!f.isAlive()) return; 
            
            if(f.fClass==="samurai") {
                if(!f.dealtPhysDmgThisTurn) f.samuraiBonus += 2; else f.samuraiBonus = 0;
            }
            
            let enemy = (f === player) ? bot : player;
            let dotMsg = "";

            // Умная функция ДоТов с учетом воска Пчеловода
            let applyDotDamage = (type, name, icon) => {
                if (f.effects[type].t > 0) {
                    let d = f.effects[type].a;
                    let blockMsg = "";
                    if (f.fClass === "beekeeper" && Math.random() < 0.25) {
                        d = Math.max(0, d - 2); blockMsg = ` 🍯 Воск (-2)!`;
                        applyStatus(f, enemy, "sticky", 2, 0.15); blockMsg += ` Враг в меду!`;
                    }
                    f.takeDamage(d);
                    dotMsg += ` ${icon} ${name} (-${d} HP)${blockMsg}!`;
                    f.effects[type].t--;
                }
            };

            applyDotDamage("burn", "Горение", "🔥");
            applyDotDamage("poison", "Яд", "⚗️");
            applyDotDamage("bleed", "Кровотечение", "🩸");
            applyDotDamage("curse", "Проклятие", "💀");
            
            // --- Отхил Чернокнижника ---
            if (f.fClass === "warlock" && enemy.effects.curse.t > 0) {
                let healAmt = f.effects.pacified.t > 0 ? 3 : 1;
                f.heal(healAmt);
                dotMsg += ` 🦇 Вытягивание жизни (+${healAmt} HP)!`;
            }
            
            if(f.effects.regen.t > 0) { f.heal(f.effects.regen.a); dotMsg += ` 💚 Регенерация (+${f.effects.regen.a} HP)!`; f.effects.regen.t--; }
            
            if (dotMsg !== "") logMsg(`${f.name}:${dotMsg}`, "dot");

            // Таймеры дебаффов
            if(f.effects.ice.t>0) f.effects.ice.t--;
            if(f.effects.blind.t>0) f.effects.blind.t--;
            if(f.effects.dmgDebuff.t>0) f.effects.dmgDebuff.t--;
            if(f.effects.atkDebuff.t>0) f.effects.atkDebuff.t--;
            if(f.effects.thorns.t>0) f.effects.thorns.t--;
            if(f.effects.shield.t>0) f.effects.shield.t--;
            if(f.effects.vuln.t>0) f.effects.vuln.t--;
            if(f.effects.exhaustion.t>0) f.effects.exhaustion.t--;
            if(f.effects.sunder.t>0) f.effects.sunder.t--;
            if(f.effects.sticky.t>0) f.effects.sticky.t--;
            if(f.effects.pacified.t>0) f.effects.pacified.t--;
            if(f.effects.miasma.t>0) f.effects.miasma.t--;
            if(f.effects.healDebuff.t>0 && f.effects.healDebuff.t !== 99) f.effects.healDebuff.t--;
            if(f.effects.bonusRegen.t>0) f.effects.bonusRegen.t--;
            if(f.effects.weakBlock.t>0) f.effects.weakBlock.t--;

            for(let k in f.cooldowns) if(f.cooldowns[k]>0) f.cooldowns[k]--;
        });

        updateStats(); roundNum++;
        
        // --- ВЫВОДИМ ВСПЛЫВАЮЩИЕ ЦИФРЫ ОДИН РАЗ ЗА РАУНД ---
        if (player.turnMaxDmg > 0) showFloatingText("p-avatar", `-${player.turnMaxDmg}`, "dmg");
        if (player.turnMaxHeal > 0) showFloatingText("p-avatar", `+${player.turnMaxHeal} HP`, "heal");
        
        if (bot.turnMaxDmg > 0) showFloatingText("b-avatar", `-${bot.turnMaxDmg}`, "dmg");
        if (bot.turnMaxHeal > 0) showFloatingText("b-avatar", `+${bot.turnMaxHeal} HP`, "heal");

        let rInp = document.querySelector('input[name="spell"][value="none"]'); if(rInp) rInp.checked = true;
        checkGameOver();
    }

    function hideOverlay() {
        document.getElementById("result-overlay").classList.remove("show");
        
        // Возвращаем кнопку действия, но превращаем её в кнопку возврата к итогам
        let btnFight = document.getElementById("btn-fight");
        btnFight.style.display = "block";
        btnFight.innerHTML = "🏆 Вернуться к итогам";
        btnFight.onclick = () => document.getElementById("result-overlay").classList.add("show");
    }

    function checkGameOver() {
        if(!player.isAlive() || !bot.isAlive()) {
            document.getElementById("btn-fight").style.display = "none";
            updateStats();
            
            let overlay = document.getElementById("result-overlay");
            let title = document.getElementById("result-title");
            let desc = document.getElementById("result-desc");

            if(player.isAlive()) { 
                title.innerHTML = "🏆 Победа!";
                title.className = "res-win";
                desc.innerHTML = `Вражеский ${NAMES[matchGender][bot.fClass]} повержен.`;
            } else if(bot.isAlive()) { 
                title.innerHTML = "💀 Поражение";
                title.className = "res-lose";
                desc.innerHTML = "Вы пали на арене...";
            } else { 
                title.innerHTML = "🤝 Ничья";
                title.className = "res-draw";
                desc.innerHTML = "Оба бойца рухнули замертво.";
            }
            
            // Показываем окно с небольшой задержкой, чтобы игрок успел увидеть последний удар
            setTimeout(() => {
                overlay.classList.add("show");
            }, 600);
        }
    }
</script>
<div id="result-overlay">
    <div class="result-box">
        <h1 id="result-title">🏆 Победа!</h1>
        <div id="result-desc">Вражина повержена.</div>
        
        <button onclick="startNewBattle()" style="margin-bottom: 12px; background: #FFD500; color: #06362D; border: 2px solid #D1A505; font-size: 17px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">Следующий противник</button>
        
        <button onclick="goToStartScreen()" style="background: #155332; color: #DEE2B1; border: 2px solid #06362D; font-size: 14px; box-shadow: none;">Сменить класс</button>

        <button onclick="hideOverlay()" style="background: transparent; color: #DEE2B1; border: none; font-size: 13px; margin-top: 10px; box-shadow: none; padding: 5px;">👀 Посмотреть лог боя</button>
    </div>
</div>
<script>
    // --- Анимированный фон (Искры/Звёзды) ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];

    // Цвета искр: Ваниль, Золото, Темное золото, Изумрудный
    const sparkColors = ['#DEE2B1', '#FFD500', '#D1A505', '#2ecc71'];

    function resizeCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.radius = Math.random() * 1.5 + 0.5; // Размер от 0.5 до 2px
            this.color = sparkColors[Math.floor(Math.random() * sparkColors.length)];
            
            // Медленное движение вверх и легкий дрейф по горизонтали
            this.vx = (Math.random() - 0.5) * 0.3; 
            this.vy = (Math.random() - 1) * 0.4 - 0.1; 
            
            // Пульсация
            this.alpha = Math.random() * 0.5 + 0.1;
            this.alphaChange = (Math.random() * 0.02 - 0.01);
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            // Изменение прозрачности (мерцание)
            this.alpha += this.alphaChange;
            if (this.alpha <= 0.1 || this.alpha >= 0.8) {
                this.alphaChange = -this.alphaChange;
            }

            // Если частица улетела за верхний край - возвращаем вниз
            if (this.y < 0) {
                this.y = height;
                this.x = Math.random() * width;
            }
            // Если улетела за боковые края
            if (this.x < 0) this.x = width;
            if (this.x > width) this.x = 0;
        }

        draw() {
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }

    // Создаем 70 частиц (можно изменить количество)
    for (let i = 0; i < 70; i++) {
        particles.push(new Particle());
    }

    // --- Анимированный фон (Оптимизированный под 60 FPS) ---
    // ... (код с классом Particle и заполнением массива остается прежним) ...

    let lastTime = 0;
    const fpsLimit = 60; // Можно поставить 40 для еще большей экономии заряда

    function animateParticles(timestamp) {
        // Вычисляем разницу во времени между кадрами
        const delta = timestamp - lastTime;

        // Если прошло достаточно времени (для 60 FPS это ~16.6мс)
        if (delta >= 1000 / fpsLimit) {
            lastTime = timestamp;

            ctx.clearRect(0, 0, width, height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
        }
        
        // Запрашиваем следующий кадр, передавая timestamp
        requestAnimationFrame(animateParticles);
    }
    
    // Запускаем анимацию, передав начальный 0
    requestAnimationFrame(animateParticles);
</script> </body>
